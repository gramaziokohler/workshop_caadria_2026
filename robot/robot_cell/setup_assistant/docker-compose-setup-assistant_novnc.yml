version: '2'
services:
  moveit-service-setup-assistant:
    build:
      context: .
      dockerfile: Dockerfile.novnc
    container_name: moveit-service-setup-assistant
    environment:
      - ROS_HOSTNAME=moveit-service-setup-assistant
      - ROS_MASTER_URI=http://ros-core:11311
    ports:
      - "6080:8080"
    depends_on:
      - ros-core
    volumes:
      - ../abb_irb_2600_moveit_config:/root/catkin_ws/src/abb_irb_2600_moveit_config

  ros-core:
    image: gramaziokohler/ros-noetic-dfab
    container_name: ros-core
    ports:
      - "11311:11311"
    command:
      - roscore

  ros-bridge:
    image: gramaziokohler/ros-noetic-dfab
    container_name: ros-bridge
    environment:
      - "ROS_HOSTNAME=ros-bridge"
      - "ROS_MASTER_URI=http://ros-core:11311"
    ports:
      - "9090:9090"
    depends_on:
      - ros-core
    command:
      - roslaunch
      - --wait
      - rosbridge_server
      - rosbridge_websocket.launch

  ros-fileserver:
    image: gramaziokohler/ros-noetic-dfab
    container_name: ros-fileserver
    environment:
      - ROS_HOSTNAME=ros-fileserver
      - ROS_MASTER_URI=http://ros-core:11311
    depends_on:
      - ros-core
    volumes:
      - ../abb_irb_2600_moveit_config:/root/catkin_ws/src/abb_irb_2600_moveit_config
    command:
      - roslaunch
      - --wait
      - file_server
      - file_server.launch