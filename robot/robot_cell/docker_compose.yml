name: fall_demo_2025
services:
  moveit-demo:
    image: gramaziokohler/ros-noetic-dfab
    container_name: moveit-demo
    environment:
      - ROS_HOSTNAME=moveit-demo
      - ROS_MASTER_URI=http://ros-core:11311
      # GUI Option 1: To forward the GUI to an external X11 server (eg. XMing), uncomment the following line
      # - DISPLAY=host.docker.internal:0.0
      # GUI Option 2: To use the web-based GUI, uncomment the following line
      # - DISPLAY=gui:0.0
    depends_on:
      - ros-core
      # To use the web-based GUI, uncomment the following line
      # - gui
    volumes:
      - ./abb_irb_2600_moveit_config:/root/catkin_ws/src/abb_irb_2600_moveit_config
    command:
      - roslaunch
      - --wait
      # To change the robot, select the corresponding package name here, eg. `ur10e_moveit_config`
      - abb_irb_2600_moveit_config
      - demo.launch
      # To launch the RVIZ GUI, change the following to true and activate one of the two GUI options above
      - use_rviz:=false

  ros-core:
    image: gramaziokohler/ros-noetic-dfab
    container_name: ros-core
    ports:
      - "11311:11311"
    command:
      - roscore

  ros-bridge:
    image: gramaziokohler/ros-noetic-dfab
    container_name: ros-bridge
    environment:
      - "ROS_HOSTNAME=ros-bridge"
      - "ROS_MASTER_URI=http://ros-core:11311"
    ports:
      - "9090:9090"
    depends_on:
      - ros-core
    command:
      - roslaunch
      - --wait
      - rosbridge_server
      - rosbridge_websocket.launch

  ros-fileserver:
    image: gramaziokohler/ros-noetic-dfab
    container_name: ros-fileserver
    environment:
      - ROS_HOSTNAME=ros-fileserver
      - ROS_MASTER_URI=http://ros-core:11311
    depends_on:
      - ros-core
    volumes:
      - ./abb_irb_2600_moveit_config:/root/catkin_ws/src/abb_irb_2600_moveit_config
    command:
      - roslaunch
      - --wait
      - file_server
      - file_server.launch


  # rrc-driver-r11:
  #   image: gramaziokohler/ros-noetic-dfab
  #   container_name: rrc-driver-r11
  #   environment:
  #     - ROS_HOSTNAME=rrc-driver-r11
  #     - ROS_MASTER_URI=http://ros-core:11311
  #   depends_on:
  #     - ros-core
  #   command:
  #     - roslaunch
  #     - --wait
  #     - compas_rrc_driver
  #     - bringup.launch
  #     - robot_ip:=192.168.0.11
  #     # - robot_ip:=host.docker.internal
  #     - robot_streaming_port:=30101
  #     - robot_state_port:=30201
  #     - namespace:=r11


  mqtt-broker:
    image: emqx/nanomq:latest
    container_name: mqtt-broker
    ports:
      - "1883:1883"
      - "8083:8083"
      - "8084:8084"
      - "8080:8080"

  immudb:
    image: codenotary/immudb:latest
    container_name: immudb
    ports:
      - "3322:3322"
      - "9497:9497"
      - "8999:8080"

