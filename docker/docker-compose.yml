name: antikythera
services:
  # ---------------------------------------------------------------------------
  # Redis — persistent key-value store used by the orchestrator
  # ---------------------------------------------------------------------------
  redis:
    image: redis:8-alpine
    container_name: akt-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: ["redis-server", "--save", "60", "1", "--loglevel", "warning"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    restart: unless-stopped
  # ---------------------------------------------------------------------------
  # MQTT broker — message bus for orchestrator ↔ agents communication
  # ---------------------------------------------------------------------------
  mqtt-broker:
    image: eclipse-mosquitto:latest
    container_name: akt-mqtt-broker
    ports:
      - "1883:1883"   # MQTT (TCP) — used by orchestrator and agents
      - "8083:8083"   # MQTT over WebSocket — used by the browser frontend
    volumes:
      - ./config/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "ps -ef | grep -v grep | grep mosquitto"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Orchestrator — FastAPI server that manages blueprint sessions
  # ---------------------------------------------------------------------------
  orchestrator:
    image: gramaziokohler/antikythera:0.3.0
    container_name: akt-orchestrator
    ports:
      - "8000:8000"   # REST API (proxied by the frontend nginx)
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      MQTT_BROKER_HOST: mqtt-broker
      MQTT_BROKER_PORT: 1883
    depends_on:
      mqtt-broker:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["antikythera", "--dev", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # System agents — background workers for built-in task types (system.*)
  # ---------------------------------------------------------------------------
  agents:
    image: gramaziokohler/antikythera:0.3.0
    container_name: akt-agents-sys
    depends_on:
      mqtt-broker:
        condition: service_healthy
      orchestrator:
        condition: service_started
    command:
      - antikythera-agents
      - --sys-only
      - --broker-host
      - mqtt-broker
      - --broker-port
      - "1883"
    restart: unless-stopped

  # ---------------------------------------------------------------------------
  # Frontend — React app served by nginx, proxies /api → orchestrator
  # To build WITHOUT the blueprint editor (author.html), you can override the
  # build arg: `--build-arg VITE_INCLUDE_AUTHOR=false` (requires vite.config.ts
  # changes; both entry points are included by default).
  # ---------------------------------------------------------------------------
  frontend:
    image: gramaziokohler/antikythera-frontend:0.3.0
    container_name: akt-frontend
    ports:
      - "80:80"       # Serves the UI; /api/* is proxied to orchestrator:8000
    depends_on:
      - orchestrator
    restart: unless-stopped

